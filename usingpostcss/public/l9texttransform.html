<!DOCTYPE html>
<html>
<head>
    <title>Text Transform</title>
    <link href="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Tailwind_CSS_Logo.svg/2048px-Tailwind_CSS_Logo.svg.png" rel="icon" type="image/png">
    <link href="./tailwind.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    
    <h1>This is tailwind css</h1>

    <p class="uppercase">this is a sample text</p>
    <p class="lowercase">THIS IS A SAMPLE TEXT</p>
    <p class="capitalize">this is a sample text</p>
    <p class="normal-case">THIS IS a sample text</p>
    
</body>
</html>

<!--
uppercase       text-transform:uppercase;
lowercase       text-transform:lowercase;
capitalize      text-transform:capitalize;
normal-case     text-transform:none;
-->
