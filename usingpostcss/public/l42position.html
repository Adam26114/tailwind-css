<!DOCTYPE html>
<html>
<head>
    <title>Position</title>
    <link href="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Tailwind_CSS_Logo.svg/2048px-Tailwind_CSS_Logo.svg.png" rel="icon" type="image/png">
    <link href="./tailwind.css" rel="stylesheet" type="text/css"/>

    <style type="text/css">
        .box{
            width:200px;
            height:200px;
            background-color:silver;
        }

        .div1{
            width:100px;
            height:100px;
            background-color:black;
            color:#fff;
        }
        
        .div2{
            width:100px;
            height:100px;
            background-color:orange;
            color:#fff;
        }
    </style>
</head>
<body>

   <h1>This is Tailwind Css</h1>
   <div class="box">
        <div class="div1 absolute z-10">DIV1</div>
        <div class="div2 absolute z-50">DIV2</div>
   </div>

    <script src="https://cdn.tailwindcss.com"></script>

</body>
</html>
