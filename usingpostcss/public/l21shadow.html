<!DOCTYPE html>
<html>
<head>
    <title>Shadow And Drop Shadow</title>
    <link href="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Tailwind_CSS_Logo.svg/2048px-Tailwind_CSS_Logo.svg.png" rel="icon" type="image/png">
    <link href="./tailwind.css" rel="stylesheet" type="text/css"/>
    <style type="text/css">
        body{
            background-color:#f1f1f1;
        }

        .box{
            width:200px;
            height:200px;
            background-color:#f4f4f4;

            margin:20px;
            border:1px solid red;
        }

        .d-flex{
            width:600px;
            display:flex;
        }
    </style>
</head>
<body>
    
    <h1>This is Tailwind Css</h1>

    <div class="d-flex">
        <div class="box"></div>
        <div class="box"></div>
    </div>

</body>
</html>
